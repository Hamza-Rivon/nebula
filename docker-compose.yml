services:
  nebula:
    build:
      context: .
      dockerfile: Dockerfile
    image: nebula:local
    container_name: nebula
    ports:
      - "${NEBULA_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      NEBULA_DB_PATH: /data/nebula.db
    volumes:
      - nebula-data:/data
      # Set NEBULA_SEED_HOST_DIR in .env to import every *.jsonl recursively
      # from that host folder on container startup. Each (path, sha256) is
      # imported once. When unset, the proxy default (./proxy/data_seed) is
      # mounted; if that's empty/missing the seeder finds nothing and skips.
      - ${NEBULA_SEED_HOST_DIR:-./proxy/data_seed}:/seed:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  nebula-data:
